<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイ語学習アプリ</title>
<style>
  :root {
    --red: #FF0000;
    --black: #111111;
    --white: #FFFFFF;
    --gray-light: #F5F5F5;
    --gray-mid: #CCCCCC;
    --gray-dark: #666666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; background: var(--white); color: var(--black); min-height: 100vh; }

  header {
    background: var(--red);
    color: var(--white);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 { font-size: 1.1rem; font-weight: bold; letter-spacing: 0.1em; }
  header span { font-size: 1.4rem; }

  nav {
    display: flex;
    background: var(--white);
    border-bottom: 1px solid var(--black);
  }
  nav button {
    flex: 1;
    padding: 14px;
    border: none;
    background: none;
    font-size: 0.9rem;
    font-weight: bold;
    letter-spacing: 0.05em;
    cursor: pointer;
    color: var(--gray-dark);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  nav button.active { color: var(--black); border-bottom-color: var(--black); }
  nav button:hover { color: var(--black); background: var(--gray-light); }

  .screen { display: none; padding: 24px 16px; max-width: 600px; margin: 0 auto; }
  .screen.active { display: block; }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }
  .cat-btn {
    padding: 12px 8px;
    border: 1px solid var(--gray-mid);
    border-radius: 0;
    background: var(--white);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: bold;
    letter-spacing: 0.03em;
    text-align: center;
    transition: all 0.15s;
    color: var(--black);
  }
  .cat-btn.selected { background: var(--black); color: var(--white); border-color: var(--black); }
  .cat-btn:hover { border-color: var(--black); }

  /* Flashcard */
  .card-container { perspective: 1000px; margin: 16px 0; }
  .card {
    width: 100%; height: 220px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s;
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    border: 1px solid var(--black);
  }
  .card-front { background: var(--gray-light); }
  .card-back { background: var(--white); transform: rotateY(180deg); }

  .thai-text { font-size: 3rem; margin-bottom: 4px; color: var(--black); }
  .romanize { font-size: 0.9rem; color: var(--gray-dark); }
  .katakana { font-size: 1rem; color: var(--red); font-weight: bold; margin-top: 2px; }
  .meaning { font-size: 1.5rem; font-weight: bold; color: var(--black); }
  .example-block {
    margin-top: 12px; padding-top: 10px;
    border-top: 1px solid var(--gray-mid);
    width: 100%; text-align: center;
  }
  .example-label { font-size: 0.68rem; color: var(--gray-dark); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .example-thai { font-size: 1.1rem; color: var(--black); margin-bottom: 2px; }
  .example-roman { font-size: 0.8rem; color: var(--gray-dark); }
  .tap-hint { font-size: 0.75rem; color: var(--gray-dark); margin-top: 10px; letter-spacing: 0.05em; }

  .speak-btn {
    background: none;
    border: 1px solid var(--gray-mid);
    border-radius: 0;
    width: 40px; height: 40px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    margin: 6px auto 0;
  }
  .speak-btn:hover { background: var(--gray-light); border-color: var(--black); }
  .speak-btn.speaking { background: var(--black); border-color: var(--black); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  .no-voice-msg { font-size: 0.75rem; color: var(--red); text-align: center; margin-top: 4px; }

  .card-controls {
    display: flex; gap: 8px; justify-content: center;
    margin-top: 12px; flex-wrap: wrap;
  }
  .card-controls button {
    padding: 10px 24px;
    border: 1px solid var(--black);
    border-radius: 0;
    font-size: 0.85rem;
    font-weight: bold;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-prev { background: var(--white); color: var(--black); }
  .btn-next { background: var(--black); color: var(--white); }
  .btn-prev:hover { background: var(--gray-light); }
  .btn-next:hover { background: #333; }

  .judge-controls { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }
  .btn-known {
    flex: 1; max-width: 160px; padding: 12px;
    border: 1px solid var(--black); border-radius: 0;
    background: var(--white); color: var(--black);
    font-size: 0.9rem; font-weight: bold; letter-spacing: 0.03em;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-unknown {
    flex: 1; max-width: 160px; padding: 12px;
    border: 1px solid var(--red); border-radius: 0;
    background: var(--white); color: var(--red);
    font-size: 0.9rem; font-weight: bold; letter-spacing: 0.03em;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-known:hover { background: var(--black); color: var(--white); }
  .btn-unknown:hover { background: var(--red); color: var(--white); }

  .card-meta {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;
  }
  .bookmark-btn {
    background: none; border: none;
    font-size: 1.3rem; cursor: pointer;
    opacity: 0.3; transition: all 0.15s; padding: 2px 6px;
  }
  .bookmark-btn.active { opacity: 1; }
  .bookmark-btn:hover { opacity: 0.7; }

  .flash-result {
    background: var(--white); border: 1px solid var(--black);
    padding: 32px 20px; text-align: center;
  }
  .flash-result-score { font-size: 2.5rem; font-weight: bold; color: var(--black); margin: 10px 0; }
  .flash-result-bar { display: flex; gap: 8px; justify-content: center; margin: 16px 0; }
  .fr-known { background: var(--white); color: var(--black); border: 1px solid var(--black); padding: 8px 20px; font-weight: bold; font-size: 0.85rem; }
  .fr-unknown { background: var(--white); color: var(--red); border: 1px solid var(--red); padding: 8px 20px; font-weight: bold; font-size: 0.85rem; }
  .flash-result-msg { color: var(--gray-dark); margin: 8px 0 20px; font-size: 0.9rem; }
  .btn-retry-flash {
    padding: 12px 28px; border: 1px solid var(--black); border-radius: 0;
    background: var(--black); color: var(--white); font-size: 0.9rem; font-weight: bold;
    cursor: pointer; margin: 4px; letter-spacing: 0.05em;
  }
  .btn-review-flash {
    padding: 12px 28px; border: 1px solid var(--red); border-radius: 0;
    background: var(--red); color: var(--white); font-size: 0.9rem; font-weight: bold;
    cursor: pointer; margin: 4px; letter-spacing: 0.05em;
  }

  .review-badge {
    display: inline-block; background: var(--red); color: var(--white);
    border-radius: 0; font-size: 0.7rem; font-weight: bold;
    padding: 1px 6px; margin-left: 4px; vertical-align: middle;
  }

  .progress-bar-wrap {
    background: var(--gray-light);
    height: 3px;
    margin: 12px 0;
  }
  .progress-bar { height: 100%; background: var(--black); transition: width 0.3s; }
  .progress-text { text-align: center; font-size: 0.78rem; color: var(--gray-dark); margin-bottom: 4px; letter-spacing: 0.05em; }

  /* Quiz */
  .quiz-question {
    background: var(--gray-light);
    border: 1px solid var(--black);
    padding: 28px 20px; text-align: center; margin-bottom: 16px;
  }
  .quiz-thai { font-size: 2.8rem; margin-bottom: 6px; color: var(--black); }
  .quiz-romanize { font-size: 0.9rem; color: var(--gray-dark); }
  .quiz-label { font-size: 0.75rem; color: var(--gray-dark); margin-bottom: 8px; letter-spacing: 0.1em; text-transform: uppercase; }

  .options-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 16px;
  }
  .option-btn {
    padding: 16px 12px;
    border: 1px solid var(--gray-mid);
    border-radius: 0;
    background: var(--white);
    font-size: 0.95rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    color: var(--black);
  }
  .option-btn:hover:not(:disabled) { border-color: var(--black); background: var(--gray-light); }
  .option-btn.correct { background: var(--black); border-color: var(--black); color: var(--white); }
  .option-btn.wrong { background: var(--white); border-color: var(--red); color: var(--red); }
  .option-btn:disabled { cursor: default; }

  .feedback {
    text-align: center; padding: 12px; margin-bottom: 16px;
    font-weight: bold; font-size: 0.9rem; letter-spacing: 0.05em;
    border: 1px solid;
  }
  .feedback.correct { background: var(--black); color: var(--white); border-color: var(--black); }
  .feedback.wrong { background: var(--white); color: var(--red); border-color: var(--red); }

  .quiz-score {
    display: flex; justify-content: space-around;
    background: var(--gray-light); border: 1px solid var(--gray-mid);
    padding: 16px; margin-bottom: 16px;
  }
  .score-item { text-align: center; }
  .score-num { font-size: 1.6rem; font-weight: bold; color: var(--black); }
  .score-label { font-size: 0.72rem; color: var(--gray-dark); letter-spacing: 0.08em; margin-top: 2px; }

  .btn-start, .btn-next-q {
    display: block; width: 100%; padding: 15px;
    border: none; border-radius: 0;
    background: var(--black); color: var(--white);
    font-size: 0.9rem; font-weight: bold;
    letter-spacing: 0.1em; cursor: pointer; transition: background 0.15s;
  }
  .btn-start:hover, .btn-next-q:hover { background: #333; }

  .result-box {
    background: var(--white); border: 1px solid var(--black);
    padding: 36px 20px; text-align: center;
  }
  .result-emoji { font-size: 2.5rem; margin-bottom: 12px; }
  .result-title { font-size: 1rem; font-weight: bold; letter-spacing: 0.1em; margin-bottom: 8px; color: var(--gray-dark); }
  .result-score { font-size: 2.8rem; font-weight: bold; color: var(--black); margin: 12px 0; }
  .result-msg { color: var(--gray-dark); margin-bottom: 24px; font-size: 0.9rem; }
  .btn-retry {
    padding: 13px 36px;
    border: 1px solid var(--black);
    border-radius: 0;
    background: var(--black);
    color: var(--white);
    font-size: 0.9rem;
    font-weight: bold;
    letter-spacing: 0.1em;
    cursor: pointer;
  }
  .btn-retry:hover { background: #333; }

  section h2 {
    font-size: 0.75rem;
    font-weight: bold;
    letter-spacing: 0.12em;
    color: var(--gray-dark);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <span>🇹🇭</span>
  <h1>タイ語学習アプリ</h1>
</header>

<nav>
  <button class="active" onclick="showScreen('flash')">📇 フラッシュカード</button>
  <button onclick="showScreen('quiz')">📝 クイズ</button>
</nav>

<!-- FLASHCARD SCREEN -->
<div id="flash" class="screen active">
  <section>
    <h2>カテゴリを選ぶ</h2>
    <div class="category-grid" id="flash-cats"></div>
  </section>

  <div class="card-meta">
    <div class="progress-text" id="flash-progress"></div>
    <button class="bookmark-btn" id="bookmark-btn" onclick="toggleBookmark()" title="復習リストに追加">🔖</button>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="flash-bar"></div></div>

  <div class="card-container">
    <div class="card" id="flash-card" onclick="flipCard()">
      <div class="card-front">
        <div class="thai-text" id="card-thai"></div>
        <div class="katakana" id="card-kana"></div>
        <div class="romanize" id="card-roman"></div>
        <button class="speak-btn" id="flash-speak-btn" onclick="event.stopPropagation(); speakThai(document.getElementById('card-thai').textContent, 'flash-speak-btn')">🔊</button>
        <div class="tap-hint">タップして日本語を見る</div>
      </div>
      <div class="card-back">
        <div class="meaning" id="card-meaning"></div>
        <div class="example-block" id="card-example-block" style="display:none">
          <div class="example-label">例文</div>
          <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
            <div class="example-thai" id="card-example"></div>
            <button class="speak-btn" id="ex-speak-btn" style="width:34px;height:34px;font-size:1rem;margin:0;" onclick="event.stopPropagation(); speakThai(document.getElementById('card-example').textContent, 'ex-speak-btn')">🔊</button>
          </div>
          <div class="example-roman" id="card-example-roman"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="judge-controls" id="judge-controls">
    <button class="btn-unknown" onclick="judgeCard(false)">✗ わからなかった</button>
    <button class="btn-known" onclick="judgeCard(true)">✓ わかった</button>
  </div>

  <div class="card-controls">
    <button class="btn-prev" onclick="prevCard()">◀ 前へ</button>
    <button class="btn-next" onclick="nextCard()">次へ ▶</button>
  </div>

  <div id="flash-result" style="display:none" class="flash-result">
    <div style="font-size:2.5rem" id="fr-emoji"></div>
    <div style="font-size:1.1rem;font-weight:bold;margin-top:8px">セッション終了！</div>
    <div class="flash-result-score" id="fr-score"></div>
    <div class="flash-result-bar">
      <div class="fr-known" id="fr-known-count"></div>
      <div class="fr-unknown" id="fr-unknown-count"></div>
    </div>
    <div class="flash-result-msg" id="fr-msg"></div>
    <div>
      <button class="btn-retry-flash" onclick="retryFlash()">🔄 もう一度</button>
      <button class="btn-review-flash" id="fr-review-btn" onclick="startReviewMode()" style="display:none">📌 要復習のみ練習</button>
    </div>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz" class="screen">
  <section>
    <h2>カテゴリを選ぶ</h2>
    <div class="category-grid" id="quiz-cats"></div>
  </section>

  <div id="quiz-start-area">
    <div class="quiz-score">
      <div class="score-item"><div class="score-num" id="q-correct">0</div><div class="score-label">正解</div></div>
      <div class="score-item"><div class="score-num" id="q-wrong">0</div><div class="score-label">不正解</div></div>
      <div class="score-item"><div class="score-num" id="q-total">0</div><div class="score-label">問題数</div></div>
    </div>
    <button class="btn-start" onclick="startQuiz()">クイズを始める</button>
  </div>

  <div id="quiz-area" style="display:none">
    <div class="progress-text" id="quiz-progress"></div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="quiz-bar"></div></div>

    <div class="quiz-question">
      <div class="quiz-label">次の単語の意味は？</div>
      <div class="quiz-thai" id="q-thai"></div>
      <button class="speak-btn" id="quiz-speak-btn" onclick="speakThai(document.getElementById('q-thai').textContent, 'quiz-speak-btn')">🔊</button>
      <div class="katakana" id="q-kana"></div>
      <div class="quiz-romanize" id="q-roman"></div>
    </div>

    <div class="options-grid" id="q-options"></div>
    <div class="feedback" id="q-feedback" style="display:none"></div>
    <button class="btn-next-q" id="q-next-btn" style="display:none" onclick="nextQuestion()">次の問題へ</button>
  </div>

  <div id="quiz-result" style="display:none">
    <div class="result-box">
      <div class="result-emoji" id="res-emoji"></div>
      <div class="result-title">クイズ終了！</div>
      <div class="result-score" id="res-score"></div>
      <div class="result-msg" id="res-msg"></div>
      <button class="btn-retry" onclick="resetQuiz()">もう一度チャレンジ</button>
    </div>
  </div>
</div>

<script>
const WORDS = {
  "あいさつ": [
    { thai:"สวัสดี", kana:"サワディー", roman:"sawatdii", meaning:"こんにちは／こんばんは", ex:"สวัสดีครับ คุณสบายดีไหม", exRoman:"サワディー クラップ クン サバーイ ディー マイ（こんにちは、元気ですか？）" },

    { thai:"ไม่ใช่", kana:"マイ チャイ", roman:"mâi châi", meaning:"いいえ・違います", ex:"ไม่ใช่ค่ะ ฉันไม่รู้จัก", exRoman:"マイ チャイ カ チャン マイ ルーチャック（いいえ、知りません）" },
    { thai:"ลาก่อน", kana:"ラーゴーン", roman:"laa kɔ̀ɔn", meaning:"さようなら", ex:"ลาก่อนนะครับ พรุ่งนี้เจอกัน", exRoman:"ラーゴーン ナ クラップ プルン ニー チョー ガン（さようなら、また明日）" },
    { thai:"ขอโทษ", kana:"コートート", roman:"khɔ̌ɔ thôot", meaning:"ごめんなさい", ex:"ขอโทษนะครับ ผมมาสาย", exRoman:"コートート ナ クラップ ポム マー サーイ（遅れてごめんなさい）" },
    { thai:"ไม่เป็นไร", kana:"マイ ペン ライ", roman:"mâi pen rai", meaning:"大丈夫・気にしないで", ex:"ไม่เป็นไรค่ะ ไม่ต้องกังวล", exRoman:"マイ ペン ライ カ マイ トーン ガンウォン（大丈夫、心配しないで）" },

    { thai:"แล้วเจอกัน", kana:"レーオ チョー ガン", roman:"lɛ́ɛo cəə kan", meaning:"またね", ex:"แล้วเจอกันพรุ่งนี้นะ", exRoman:"レーオ チョー ガン プルン ニー ナ（また明日ね）" },

    { thai:"ดีใจที่ได้เจอ", kana:"ディーチャイ ティー ダイ ジュー", roman:"dii cai thîi dâi cəə", meaning:"お会いできて嬉しい", ex:"ดีใจที่ได้เจอคุณอีกครั้ง", exRoman:"ディーチャイ ティー ダイ ジュー クン イーク クラン（またお会いできて嬉しいです）" },

    { thai:"ซื้อ", kana:"スー", roman:"sʉ́ʉ", meaning:"買う", ex:"ซื้ออันนี้ครับ", exRoman:"スー アン ニー クラップ（これを買います）" },
    { thai:"ขาย", kana:"カーイ", roman:"khǎai", meaning:"売る", ex:"ขายดีไหมครับวันนี้", exRoman:"カーイ ディー マイ クラップ ワン ニー（今日は売れていますか？）" },
    { thai:"จ่ายเงิน", kana:"チャーイ グン", roman:"càai ngən", meaning:"支払う", ex:"จ่ายเงินที่ไหนครับ", exRoman:"チャーイ グン ティーナイ クラップ（どこで支払いますか？）" },
    { thai:"เงินทอน", kana:"グン トーン", roman:"ngən thɔɔn", meaning:"お釣り", ex:"เงินทอนไม่ถูกครับ", exRoman:"グン トーン マイ トゥーク クラップ（お釣りが違います）" },
    { thai:"ใบเสร็จ", kana:"バイ เセット", roman:"bai sèt", meaning:"レシート", ex:"ขอใบเสร็จด้วยครับ", exRoman:"コー バイ セット ドゥアイ クラップ（レシートをください）" },
    { thai:"ถุง", kana:"トゥン", roman:"thǔng", meaning:"袋", ex:"ขอถุงด้วยครับ", exRoman:"コー トゥン ドゥアイ クラップ（袋をください）" },
    { thai:"สี", kana:"スィー", roman:"sǐi", meaning:"色", ex:"มีสีอื่นไหมครับ", exRoman:"ミー スィー ウーン マイ クラップ（他の色はありますか？）" },
    { thai:"ขนาด", kana:"カナート", roman:"khanàat", meaning:"サイズ", ex:"ขนาดใหญ่กว่านี้มีไหมครับ", exRoman:"カナート ヤイ クワー ニー ミー マイ クラップ（これより大きいサイズはありますか？）" },
    { thai:"ลอง", kana:"ローン", roman:"lɔɔng", meaning:"試す・試着する", ex:"ลองใส่ดูได้ไหมครับ", exRoman:"ローン サイ ドゥー ダイ マイ クラップ（試着してもいいですか？）" },
    { thai:"เปลี่ยน", kana:"プリアน", roman:"plìan", meaning:"交換する", ex:"เปลี่ยนสินค้าได้ไหมครับ", exRoman:"プリアン シンカー ダイ マイ クラップ（商品を交換できますか？）" },
    { thai:"คืน", kana:"クーン", roman:"khʉʉn", meaning:"返品する", ex:"คืนสินค้าได้ไหมครับ ชำรุด", exRoman:"クーン シンカー ダイ マイ クラップ チャムルット（返品できますか？壊れています）" },
    { thai:"บัตรเครดิต", kana:"バット クレーディット", roman:"bàt khreedìt", meaning:"クレジットカード", ex:"รับบัตรเครดิตไหมครับ", exRoman:"ラップ バット クレーディット マイ クラップ（クレジットカードは使えますか？）" },
    { thai:"เงินสด", kana:"グン ソット", roman:"ngən sòt", meaning:"現金", ex:"จ่ายเงินสดได้ไหมครับ", exRoman:"チャーイ グン ソット ダイ マイ クラップ（現金で払えますか？）" },
    { thai:"โอนเงิน", kana:"オーン グン", roman:"oon ngən", meaning:"振り込み・送金", ex:"โอนเงินผ่านแอปได้ไหมครับ", exRoman:"オーン グン パーン アップ ダイ マイ クラップ（アプリで送金できますか？）" },
  ],
};

const CATEGORIES = Object.keys(WORDS);

// 復習リスト: Set of "cat::thai" keys
let bookmarks = new Set(JSON.parse(localStorage.getItem('thai_bookmarks') || '[]'));
function saveBookmarks() { localStorage.setItem('thai_bookmarks', JSON.stringify([...bookmarks])); }
function bookmarkKey(cat, word) { return cat + '::' + word.thai; }

// State
let flashCat = CATEGORIES[0];
let flashIdx = 0;
let flashFlipped = false;
let flashOrder = [];
let flashKnown = [];   // true/false/null per flashOrder slot
let flashReviewMode = false; // 復習モード（ブックマーク単語のみ）
let flashReviewList = []; // 復習モード用単語リスト

let quizCat = CATEGORIES[0];
let quizQuestions = [];
let quizIdx = 0;
let quizCorrect = 0;
let quizWrong = 0;
let quizAnswered = false;

// Render category buttons
function renderCats() {
  const reviewCount = bookmarks.size;
  ['flash-cats','quiz-cats'].forEach((id, i) => {
    const el = document.getElementById(id);
    const cats = [...CATEGORIES];
    el.innerHTML = cats.map(c => `
      <button class="cat-btn ${(i===0?flashCat:quizCat)===c?'selected':''}"
        onclick="${i===0?'setFlashCat':'setQuizCat'}('${c}')">${c}</button>
    `).join('') + `<button class="cat-btn ${(i===0?flashCat:quizCat)==='__review__'?'selected':''}"
        onclick="${i===0?'setFlashCatReview':'setQuizCatReview'}()">📌 復習リスト${reviewCount>0?`<span class='review-badge'>${reviewCount}</span>`:''}</button>`;
  });
}

function shuffleFlash() {
  flashReviewMode = false;
  flashOrder = shuffle(WORDS[flashCat].map((_, i) => i));
  flashKnown = new Array(flashOrder.length).fill(null);
  flashIdx = 0;
}

function setFlashCatReview() {
  flashCat = '__review__';
  flashReviewMode = true;
  flashReviewList = [];
  for (const key of bookmarks) {
    const [cat, thai] = key.split('::');
    if (WORDS[cat]) {
      const w = WORDS[cat].find(x => x.thai === thai);
      if (w) flashReviewList.push({...w, _cat: cat});
    }
  }
  flashReviewList = shuffle(flashReviewList);
  flashKnown = new Array(flashReviewList.length).fill(null);
  flashIdx = 0;
  flashFlipped = false;
  renderCats();
  if (flashReviewList.length === 0) {
    document.getElementById('flash-result').style.display = 'none';
    document.getElementById('judge-controls').style.display = 'flex';
    document.getElementById('flash-card').style.display = 'block';
    document.querySelector('.card-controls').style.display = 'flex';
    alert('復習リストが空です。カードの 🔖 ボタンか、クイズで間違えると自動追加されます。');
    return;
  }
  renderCard();
}

function setQuizCatReview() {
  quizCat = '__review__';
  renderCats();
}

function setFlashCat(c) {
  flashCat = c;
  flashReviewMode = false;
  shuffleFlash();
  flashFlipped = false;
  renderCats();
  document.getElementById('flash-result').style.display = 'none';
  document.getElementById('judge-controls').style.display = 'flex';
  document.getElementById('flash-card').style.display = 'block';
  document.querySelector('.card-controls').style.display = 'flex';
  renderCard();
}
function setQuizCat(c) { quizCat = c; renderCats(); }

// Flashcard
function currentFlashWord() {
  if (flashReviewMode) return flashReviewList[flashIdx];
  return WORDS[flashCat][flashOrder[flashIdx]];
}

function renderCard() {
  const w = currentFlashWord();
  if (!w) return;
  document.getElementById('card-thai').textContent = w.thai;
  document.getElementById('card-kana').textContent = w.kana;
  document.getElementById('card-roman').textContent = w.roman;
  document.getElementById('card-meaning').textContent = w.meaning;
  document.getElementById('card-example').textContent = w.ex || '';
  document.getElementById('card-example-roman').textContent = w.exRoman || '';
  document.getElementById('card-example-block').style.display = w.ex ? 'block' : 'none';
  const total = flashReviewMode ? flashReviewList.length : WORDS[flashCat].length;
  document.getElementById('flash-progress').textContent = `${flashIdx+1} / ${total}`;
  document.getElementById('flash-bar').style.width = `${((flashIdx+1)/total)*100}%`;
  document.getElementById('flash-card').classList.remove('flipped');
  flashFlipped = false;

  // ブックマークボタン状態
  const cat = flashReviewMode ? (w._cat || flashCat) : flashCat;
  const key = bookmarkKey(cat, w);
  const btn = document.getElementById('bookmark-btn');
  btn.classList.toggle('active', bookmarks.has(key));
}

function flipCard() {
  flashFlipped = !flashFlipped;
  document.getElementById('flash-card').classList.toggle('flipped', flashFlipped);
}

function judgeCard(known) {
  flashKnown[flashIdx] = known;
  // 間違えたらブックマーク自動追加
  if (!known) {
    const w = currentFlashWord();
    const cat = flashReviewMode ? (w._cat || flashCat) : flashCat;
    bookmarks.add(bookmarkKey(cat, w));
    saveBookmarks();
  }
  const total = flashReviewMode ? flashReviewList.length : WORDS[flashCat].length;
  if (flashIdx + 1 >= total) {
    showFlashResult();
  } else {
    flashIdx++;
    renderCard();
  }
}

function toggleBookmark() {
  const w = currentFlashWord();
  if (!w) return;
  const cat = flashReviewMode ? (w._cat || flashCat) : flashCat;
  const key = bookmarkKey(cat, w);
  if (bookmarks.has(key)) bookmarks.delete(key);
  else bookmarks.add(key);
  saveBookmarks();
  renderCard();
  renderCats();
}

function showFlashResult() {
  document.getElementById('judge-controls').style.display = 'none';
  document.getElementById('flash-card').style.display = 'none';
  document.querySelector('.card-controls').style.display = 'none';
  const total = flashKnown.length;
  const knownCount = flashKnown.filter(x => x === true).length;
  const unknownCount = flashKnown.filter(x => x === false).length;
  const pct = Math.round(knownCount / total * 100);
  document.getElementById('fr-score').textContent = `${pct}%`;
  document.getElementById('fr-known-count').textContent = `✓ わかった ${knownCount}`;
  document.getElementById('fr-unknown-count').textContent = `✗ わからなかった ${unknownCount}`;
  let emoji, msg;
  if (pct === 100) { emoji='🏆'; msg='完璧！全部わかった！'; }
  else if (pct >= 80) { emoji='🎉'; msg='よくできました！'; }
  else if (pct >= 50) { emoji='😊'; msg='復習リストで苦手を克服しよう！'; }
  else { emoji='📚'; msg='まだまだ大丈夫！繰り返し練習しよう！'; }
  document.getElementById('fr-emoji').textContent = emoji;
  document.getElementById('fr-msg').textContent = msg;
  const reviewBtn = document.getElementById('fr-review-btn');
  reviewBtn.style.display = bookmarks.size > 0 ? 'inline-block' : 'none';
  document.getElementById('flash-result').style.display = 'block';
}

function retryFlash() {
  document.getElementById('flash-result').style.display = 'none';
  document.getElementById('judge-controls').style.display = 'flex';
  document.getElementById('flash-card').style.display = 'block';
  document.querySelector('.card-controls').style.display = 'flex';
  if (flashReviewMode) {
    setFlashCatReview();
  } else {
    shuffleFlash();
    renderCard();
  }
}

function startReviewMode() {
  document.getElementById('flash-result').style.display = 'none';
  document.getElementById('judge-controls').style.display = 'flex';
  document.getElementById('flash-card').style.display = 'block';
  document.querySelector('.card-controls').style.display = 'flex';
  setFlashCatReview();
}

function nextCard() {
  const total = flashReviewMode ? flashReviewList.length : WORDS[flashCat].length;
  flashIdx = (flashIdx + 1) % total;
  renderCard();
}
function prevCard() {
  const total = flashReviewMode ? flashReviewList.length : WORDS[flashCat].length;
  flashIdx = (flashIdx - 1 + total) % total;
  renderCard();
}

// Quiz
function startQuiz() {
  let words;
  if (quizCat === '__review__') {
    words = [];
    for (const key of bookmarks) {
      const [cat, thai] = key.split('::');
      if (WORDS[cat]) {
        const w = WORDS[cat].find(x => x.thai === thai);
        if (w) words.push({...w, _cat: cat});
      }
    }
    if (words.length === 0) { alert('復習リストが空です。'); return; }
  } else {
    words = WORDS[quizCat];
  }
  quizQuestions = shuffle([...words]).slice(0, Math.min(10, words.length));
  quizIdx = 0; quizCorrect = 0; quizWrong = 0;
  document.getElementById('quiz-start-area').style.display = 'none';
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  quizAnswered = false;
  const q = quizQuestions[quizIdx];
  document.getElementById('q-thai').textContent = q.thai;
  document.getElementById('q-kana').textContent = q.kana;
  document.getElementById('q-roman').textContent = q.roman;
  document.getElementById('quiz-progress').textContent = `${quizIdx+1} / ${quizQuestions.length}`;
  document.getElementById('quiz-bar').style.width = `${((quizIdx+1)/quizQuestions.length)*100}%`;
  document.getElementById('q-feedback').style.display = 'none';
  document.getElementById('q-next-btn').style.display = 'none';

  // 不正解の選択肢：同カテゴリ優先、足りなければ全単語から
  const pool = quizCat === '__review__'
    ? Object.values(WORDS).flat()
    : WORDS[quizCat];
  const wrong = shuffle(pool.filter(w => w.meaning !== q.meaning)).slice(0,3);
  const opts = shuffle([q, ...wrong]);
  const grid = document.getElementById('q-options');
  grid.innerHTML = opts.map(o => `
    <button class="option-btn" onclick="answerQuiz(this,'${escape(o.meaning)}','${escape(q.meaning)}')">${o.meaning}</button>
  `).join('');
}

function escape(s) { return s.replace(/'/g,"&#39;"); }

function answerQuiz(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => {
    b.disabled = true;
    const dec = decodeHtml(b.textContent);
    if (dec === decodeHtml(correct)) b.classList.add('correct');
  });
  const fb = document.getElementById('q-feedback');
  const q = quizQuestions[quizIdx];
  if (decodeHtml(chosen) === decodeHtml(correct)) {
    quizCorrect++;
    btn.classList.add('correct');
    fb.className = 'feedback correct';
    fb.textContent = '⭕ 正解！';
  } else {
    quizWrong++;
    btn.classList.add('wrong');
    fb.className = 'feedback wrong';
    fb.textContent = `❌ 不正解。正解は「${decodeHtml(correct)}」`;
    // 間違えた単語を復習リストに自動追加
    const cat = q._cat || quizCat;
    bookmarks.add(bookmarkKey(cat, q));
    saveBookmarks();
    renderCats();
  }
  fb.style.display = 'block';
  updateScore();

  if (quizIdx + 1 >= quizQuestions.length) {
    document.getElementById('q-next-btn').textContent = '結果を見る';
  } else {
    document.getElementById('q-next-btn').textContent = '次の問題へ';
  }
  document.getElementById('q-next-btn').style.display = 'block';
}

function decodeHtml(s) {
  const t = document.createElement('textarea');
  t.innerHTML = s;
  return t.value;
}

function nextQuestion() {
  quizIdx++;
  if (quizIdx >= quizQuestions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function updateScore() {
  document.getElementById('q-correct').textContent = quizCorrect;
  document.getElementById('q-wrong').textContent = quizWrong;
  document.getElementById('q-total').textContent = quizQuestions.length;
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('quiz-result').style.display = 'block';
  const pct = Math.round(quizCorrect / quizQuestions.length * 100);
  document.getElementById('res-score').textContent = `${quizCorrect} / ${quizQuestions.length}（${pct}%）`;
  let emoji, msg;
  if (pct === 100) { emoji='🏆'; msg='完璧！素晴らしい！'; }
  else if (pct >= 80) { emoji='🎉'; msg='よくできました！'; }
  else if (pct >= 60) { emoji='😊'; msg='もう少し！引き続き頑張ろう！'; }
  else { emoji='📚'; msg='復習してみよう！フラッシュカードも使ってね。'; }
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-msg').textContent = msg;
}

function resetQuiz() {
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('quiz-start-area').style.display = 'block';
  quizCorrect = 0; quizWrong = 0;
  document.getElementById('q-correct').textContent = 0;
  document.getElementById('q-wrong').textContent = 0;
  document.getElementById('q-total').textContent = 0;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  event.target.classList.add('active');
}

// Speech
let currentAudio = null;
let thaiVoice = null;

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  thaiVoice = voices.find(v => v.lang === 'th-TH') || voices.find(v => v.lang.startsWith('th')) || null;
}
loadVoices();
if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

function speakThai(text, btnId) {
  const btn = document.getElementById(btnId);

  // 再生中なら止める
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (typeof speechSynthesis !== 'undefined') speechSynthesis.cancel();
  document.querySelectorAll('.speak-btn').forEach(b => b.classList.remove('speaking'));

  if (btn) btn.classList.add('speaking');

  // Web Speech API（スマホ内蔵音声）を優先
  if (typeof speechSynthesis !== 'undefined') {
    loadVoices();
    if (thaiVoice) {
      const utt = new SpeechSynthesisUtterance(text);
      utt.voice = thaiVoice;
      utt.lang = 'th-TH';
      utt.rate = 0.85;
      utt.onend = () => { if (btn) btn.classList.remove('speaking'); };
      utt.onerror = () => { if (btn) btn.classList.remove('speaking'); tryGoogleTTS(text, btn); };
      speechSynthesis.speak(utt);
      return;
    }
  }

  // タイ語音声がなければ Google TTS にフォールバック
  tryGoogleTTS(text, btn);
}

function tryGoogleTTS(text, btn) {
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=th&client=tw-ob`;
  const audio = new Audio(url);
  currentAudio = audio;
  audio.onended = () => { if (btn) btn.classList.remove('speaking'); currentAudio = null; };
  audio.onerror = () => {
    if (btn) btn.classList.remove('speaking');
    currentAudio = null;
    // 最終フォールバック：lang指定のみで試みる
    if (typeof speechSynthesis !== 'undefined') {
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'th-TH';
      utt.rate = 0.85;
      utt.onend = () => { if (btn) btn.classList.remove('speaking'); };
      utt.onerror = () => {
        if (btn) btn.classList.remove('speaking');
        showVoiceError(btn);
      };
      speechSynthesis.speak(utt);
    } else {
      showVoiceError(btn);
    }
  };
  audio.play().catch(() => {
    currentAudio = null;
    if (btn) btn.classList.remove('speaking');
    showVoiceError(btn);
  });
}

function showVoiceError(btn) {
  if (!btn) return;
  const msg = document.createElement('div');
  msg.className = 'no-voice-msg';
  msg.textContent = '音声を再生できませんでした';
  btn.insertAdjacentElement('afterend', msg);
  setTimeout(() => msg.remove(), 3000);
}

// Init
shuffleFlash();
renderCats();
renderCard();
</script>
